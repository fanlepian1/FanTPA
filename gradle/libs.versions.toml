[versions]
# Minecraft and Fabric Versions
minecraft = "26.1"
fabricLoader = "0.18.6"
fabricApi = "0.144.0+26.1"

# Plugin Versions
fabricLoom = "1.16-SNAPSHOT"

# JSON Processing
gson = "2.11.0"

[libraries]
# Minecraft
minecraft = { group = "com.mojang", name = "minecraft", version.ref = "minecraft" }

# Fabric
fabricLoader = { group = "net.fabricmc", name = "fabric-loader", version.ref = "fabricLoader" }
fabricApi = { group = "net.fabricmc.fabric-api", name = "fabric-api", version.ref = "fabricApi" }

# JSON Processing
gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }

[plugins]
fabricLoom = { id = "net.fabricmc.fabric-loom", version.ref = "fabricLoom" }
mavenPublish = { id = "maven-publish" }
